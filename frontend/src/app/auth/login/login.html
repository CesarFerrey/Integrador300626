<form [formGroup]="form" class="login-page">
  <div class="login-card">
    
    <div class="login-header">
      <div class="logo">🚀</div>
      <h1>Gestión de Proyectos</h1>
      <p>Inicia sesión para acceder al sistema</p>
    </div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input pInputText id="email" type="email" placeholder="ejemplo@correo.com" formControlName="email" />
    </div>

    <div class="form-group">
      <label for="clave">Contraseña</label>
      <p-password id="clave" formControlName="clave" [feedback]="false" [toggleMask]="true" placeholder="Ingresa tu contraseña"></p-password>
    </div>

    <p-button 
        label="Iniciar sesión" 
        icon="pi pi-sign-in" 
        (click)="iniciarSesion()" 
        [disabled]="form.invalid"
        styleClass="w-full">
    </p-button>

    <div class="form-footer">
      <a routerLink="/recuperar-password">¿Olvidaste tu contraseña?</a>
      <p>¿No tenés cuenta? <a routerLink="/registrar">Registrate aquí</a></p>
    </div>

  </div>
</form>
