<form [formGroup]="form">
    <div id="main">
        <h2 id="header">Sistema de gestión de proyectos</h2>
        <input pInputText id="nombre" type="text" placeholder="Correo electrónico" formControlName="nombre" />
        <p-password id="clave" formControlName="clave" [feedback]="false" autocomplete="off" placeholder="Clave de acceso"/>
        <p-button label="Iniciar sesión" (click)="iniciarSesion()" [disabled]="form.invalid"/>
    </div>
</form>
