<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-page">
  <div class="login-card">
    
    <div class="login-header">
      <div class="logo">📝</div>
      <h1>Crear Cuenta</h1>
      <p>Registrate para comenzar a gestionar tus proyectos</p>
    </div>

    <div class="form-group">
      <label for="nombre">Nombre Completo</label>
      <input pInputText type="text" id="nombre" formControlName="nombre" placeholder="Mínimo 3 caracteres" />
      <small *ngIf="registerForm.get('nombre')?.touched && registerForm.get('nombre')?.errors?.['required']" class="error-msg">El nombre es obligatorio.</small>
      <small *ngIf="registerForm.get('nombre')?.touched && registerForm.get('nombre')?.errors?.['minlength']" class="error-msg">Mínimo 3 caracteres.</small>
    </div>

    <div class="form-group">
      <label for="email">Correo Electrónico</label>
      <input pInputText type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" />
      <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['required']" class="error-msg">El correo es obligatorio.</small>
      <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['email']" class="error-msg">Formato inválido.</small>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true" placeholder="Mínimo 6 caracteres"></p-password>
      <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']" class="error-msg">La contraseña es obligatoria.</small>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar Contraseña</label>
      <p-password id="confirmPassword" formControlName="confirmPassword" [feedback]="false" [toggleMask]="true" placeholder="Repetí tu contraseña"></p-password>
      <small *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')" class="error-msg">Las contraseñas no coinciden.</small>
    </div>

    <p-button 
        type="submit" 
        label="Registrarse" 
        [disabled]="registerForm.invalid" 
        styleClass="w-full">
    </p-button>

    <div class="form-footer">
      <p>¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a></p>
    </div>

  </div>
</form>
